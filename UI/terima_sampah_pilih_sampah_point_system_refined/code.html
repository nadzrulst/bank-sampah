<script>
        function calculate(input, subtotalId) {
            const weight = parseFloat(input.value) || 0;
            const price = parseInt(input.dataset.price);
            const subtotal = weight * price;
            
            document.getElementById(subtotalId).innerText = 'Rp' + subtotal.toLocaleString('id-ID');
            
            updateTotal();
        }

        function updateTotal() {
            const subs = [
                document.getElementById('sub-kardus').innerText,
                document.getElementById('sub-plastik').innerText,
                document.getElementById('sub-kertas').innerText
            ];
            
            let total = 0;
            subs.forEach(s => {
                total += parseInt(s.replace('Rp', '').replace(/\./g, '')) || 0;
            });
            
            document.getElementById('total-price').innerText = 'Rp' + total.toLocaleString('id-ID');
        }

        // micro-interaction for cards
        document.querySelectorAll('.bg-surface-container-lowest').forEach(card => {
            card.addEventListener('click', () => {
                card.querySelector('input').focus();
            });
        });
    </script>
