<script>
        // Simple Interaction Logic
        document.getElementById('entry-btn').addEventListener('click', function() {
            const name = document.getElementById('full_name').value;
            const phone = document.getElementById('whatsapp').value;
            
            if (!name || !phone) {
                // Shake effect on form if empty
                const form = document.querySelector('section');
                form.classList.add('animate-shake');
                setTimeout(() => form.classList.remove('animate-shake'), 400);
                alert('Silakan isi nama dan nomor WhatsApp Anda untuk melanjutkan.');
                return;
            }
            
            // Visual feedback
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Memproses...';
            this.style.opacity = '0.7';
            
            // Simulate navigation delay
            setTimeout(() => {
                alert('Selamat datang, ' + name + '! Mengalihkan ke dashboard...');
                // In a real app: window.location.href = '/dashboard';
                this.innerHTML = 'Masuk ke Dashboard <span class="material-symbols-outlined">arrow_forward</span>';
                this.style.opacity = '1';
            }, 1000);
        });

        // Add shake animation dynamically
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
            .animate-shake {
                animation: shake 0.2s ease-in-out 2;
            }
        `;
        document.head.appendChild(style);
    </script>
