<!-- Script for Interactions -->
<script>
        const PRICES = {
            beras: 150,
            gula: 160,
            minyak: 180,
            garam: 50
        };

        const cart = {
            beras: 0,
            gula: 0,
            minyak: 0,
            garam: 0
        };

        let userBalance = 5150;

        function updateQty(item, delta) {
            const newQty = cart[item] + delta;
            if (newQty >= 0) {
                cart[item] = newQty;
                document.getElementById(`qty-${item}`).innerText = newQty;
                calculateTotal();
            }
        }

        function calculateTotal() {
            let total = 0;
            for (const item in cart) {
                total += cart[item] * PRICES[item];
            }

            document.getElementById('total-points').innerText = `${total.toLocaleString()} Poin`;
            
            const remaining = userBalance - total;
            const remainingEl = document.getElementById('remaining-points');
            const remainingLabel = document.getElementById('remaining-points-label');
            const confirmBtn = document.getElementById('confirm-btn');

            if (total > 0) {
                remainingLabel.classList.remove('hidden');
                remainingEl.innerText = `${remaining.toLocaleString()} Poin`;
                
                if (remaining < 0) {
                    remainingEl.classList.add('text-error');
                    confirmBtn.disabled = true;
                } else {
                    remainingEl.classList.remove('text-error');
                    confirmBtn.disabled = false;
                }
            } else {
                remainingLabel.classList.add('hidden');
                confirmBtn.disabled = true;
            }
        }

        function confirmExchange() {
            const total = parseInt(document.getElementById('total-points').innerText.replace(/\D/g, ''));
            if (total > 0 && total <= userBalance) {
                alert(`Berhasil menukar ${total} poin dengan sembako! Silakan ambil di outlet terdekat.`);
                // Reset state
                for (let key in cart) {
                    cart[key] = 0;
                    document.getElementById(`qty-${key}`).innerText = '0';
                }
                userBalance -= total;
                document.getElementById('user-balance').innerText = userBalance.toLocaleString();
                calculateTotal();
            }
        }
    </script>
