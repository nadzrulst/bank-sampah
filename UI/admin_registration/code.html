<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daftar Akun Baru - Bank Sampah Bojong Karya 2</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#00534d",
                    "surface-container-high": "#dee8ff",
                    "background": "#f9f9ff",
                    "on-error-container": "#93000a",
                    "primary": "#003a36",
                    "primary-fixed": "#acefe6",
                    "on-tertiary-fixed": "#221a0f",
                    "on-secondary-container": "#f9f7ff",
                    "surface": "#f9f9ff",
                    "on-secondary-fixed-variant": "#0035bd",
                    "surface-container": "#e7eeff",
                    "inverse-primary": "#91d3ca",
                    "surface-tint": "#246862",
                    "surface-container-highest": "#d9e3f9",
                    "outline": "#6f7977",
                    "primary-fixed-dim": "#91d3ca",
                    "on-tertiary-container": "#c5b7a5",
                    "inverse-on-surface": "#ebf1ff",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#00201d",
                    "on-surface-variant": "#3f4947",
                    "surface-container-low": "#f0f3ff",
                    "secondary-fixed-dim": "#b8c3ff",
                    "tertiary-fixed": "#efe0cd",
                    "error-container": "#ffdad6",
                    "tertiary-container": "#52483a",
                    "secondary-fixed": "#dde1ff",
                    "secondary-container": "#3862ff",
                    "secondary": "#0a45e6",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#83c5bd",
                    "error": "#ba1a1a",
                    "on-background": "#121c2c",
                    "surface-variant": "#d9e3f9",
                    "tertiary": "#3a3225",
                    "on-secondary-fixed": "#001355",
                    "on-tertiary-fixed-variant": "#4f4537",
                    "on-primary": "#ffffff",
                    "outline-variant": "#bfc9c6",
                    "on-surface": "#121c2c",
                    "inverse-surface": "#273141",
                    "surface-bright": "#f9f9ff",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#d0daf0",
                    "on-primary-fixed-variant": "#00504a",
                    "tertiary-fixed-dim": "#d3c4b2",
                    "surface-container-lowest": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "xxl": "1rem",
                    "full": "9999px"
            },
            "spacing": {
                    "gutter": "16px",
                    "stack-lg": "24px",
                    "section-gap": "32px",
                    "base": "8px",
                    "container-padding": "20px",
                    "stack-sm": "4px",
                    "stack-md": "12px"
            },
            "fontFamily": {
                    "label-md": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],

            },
            "fontSize": {

                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                    "headline-lg": ["28px", {"lineHeight": "36px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "display-currency": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
            -webkit-tap-highlight-color: transparent;
        }
        .soft-float-shadow {
            box-shadow: 0px 10px 30px rgba(0, 83, 77, 0.06);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .input-focus-glow:focus-within {
            box-shadow: 0 0 0 4px rgba(0, 83, 77, 0.08);
            background-color: #ffffff;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-container-padding">
<!-- Top AppBar (Identity Only, No Nav for Transactional) -->
<header class="fixed top-0 w-full max-w-[768px] flex justify-center py-stack-lg z-50">
<div class="flex items-center gap-2">
<div class="w-10 h-10 bg-primary-container rounded-xl flex items-center justify-center">
<span class="material-symbols-outlined text-primary-fixed" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="font-headline-md text-headline-md-mobile text-primary tracking-tight">Bank Sampah BK2</h1>
</div>
</header>
<main class="w-full max-w-[440px] mt-20 mb-8">
<!-- Brand Narrative Header -->
<div class="text-center mb-section-gap">
<h2 class="font-headline-lg text-headline-lg-mobile text-on-surface mb-2">Daftar Akun Baru</h2>
<p class="font-body-md text-on-surface-variant px-4">Bergabunglah sebagai admin untuk mengelola ekosistem finansial hijau di komunitas Anda.</p>
</div>
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xxl p-6 md:p-8 soft-float-shadow">
<form class="space-y-5" id="registrationForm">
<!-- Full Name Field -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant ml-1">Nama Lengkap</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">person</span>
</div>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl font-body-md text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all input-focus-glow" placeholder="Masukkan nama lengkap" required="" type="text"/>
</div>
</div>
<!-- Phone Number Field -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant ml-1">Nomor WhatsApp</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">phone_iphone</span>
</div>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl font-body-md text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all input-focus-glow" placeholder="08xx xxxx xxxx" required="" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant ml-1">Kata Sandi</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-3.5 bg-surface-container-low border-none rounded-xl font-body-md text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all input-focus-glow" id="password" placeholder="Minimal 8 karakter" required="" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword('password')" type="button">
<span class="material-symbols-outlined" id="password_toggle_icon">visibility</span>
</button>
</div>
</div>
<!-- Password Confirmation Field -->
<div class="space-y-2">
<label class="font-label-md text-on-surface-variant ml-1">Konfirmasi Kata Sandi</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined">verified_user</span>
</div>
<input class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-xl font-body-md text-on-surface placeholder:text-outline/60 focus:ring-2 focus:ring-primary/20 transition-all input-focus-glow" id="confirm_password" placeholder="Ulangi kata sandi" required="" type="password"/>
</div>
</div>
<!-- Terms & Conditions Checkbox -->
<div class="flex items-start gap-3 px-1 py-2">
<div class="relative flex items-center mt-0.5">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-surface-container-low transition-all cursor-pointer" id="terms" required="" type="checkbox"/>
</div>
<label class="font-label-sm text-on-surface-variant leading-tight cursor-pointer" for="terms">
                        Saya menyetujui <span class="text-primary font-bold">Syarat &amp; Ketentuan</span> serta <span class="text-primary font-bold">Kebijakan Privasi</span> Bank Sampah Bojong Karya 2.
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-label-md text-label-md shadow-lg shadow-primary/10 active:scale-95 transition-all hover:opacity-90 mt-4 flex items-center justify-center gap-2" type="submit">
                    Daftar Sekarang
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Bottom Redirect -->
<div class="mt-8 pt-6 border-t border-surface-container text-center">
<p class="font-body-md text-on-surface-variant">
                    Sudah punya akun? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Masuk</a>
</p>
</div>
</div>
</main>
<!-- Illustrative Footer Content -->
<footer class="w-full max-w-[440px] flex flex-col items-center gap-6 opacity-60">
<div class="flex gap-4">
<div class="flex items-center gap-1.5 grayscale">
<span class="material-symbols-outlined text-outline text-[18px]">security</span>
<span class="font-label-sm text-outline">Secure Bank Grade SSL</span>
</div>
<div class="flex items-center gap-1.5 grayscale">
<span class="material-symbols-outlined text-outline text-[18px]">workspace_premium</span>
<span class="font-label-sm text-outline">Official Admin Panel</span>
</div>
</div>
</footer>
<script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const icon = document.getElementById(id + '_toggle_icon');
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
            } else {
                input.type = "password";
                icon.textContent = "visibility";
            }
        }

        // Basic Micro-interaction for form submission
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Memproses...
            `;

            // Simulate API delay
            setTimeout(() => {
                btn.classList.replace('bg-primary', 'bg-green-600');
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    Berhasil Terdaftar
                `;
                setTimeout(() => {
                    alert('Akun Admin telah berhasil dibuat! Silakan masuk ke dashboard.');
                    btn.disabled = false;
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-green-600', 'bg-primary');
                }, 1000);
            }, 1500);
        });
    </script>
</body></html>
